name: nox-cms

services:
  mysql:
    image: mysql:8.4
    container_name: nox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-nox_cms}
      MYSQL_USER: ${DB_USERNAME:-nox}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - nox

  api:
    build:
      context: ./docker/php
    container_name: nox-api
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - ./api:/var/www/html
      - composer_cache:/root/.composer/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "REQUEST_METHOD=GET SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 600s
    networks:
      - nox

  worker:
    build:
      context: ./docker/php
    container_name: nox-worker
    restart: unless-stopped
    command: ["worker-start.sh"]
    working_dir: /var/www/html
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - ./api:/var/www/html
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nox

  nginx:
    image: nginx:1.27-alpine
    container_name: nox-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api:/var/www/html:ro
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nox

  web:
    build:
      context: ./docker/web
    container_name: nox-web
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      DEV_PORT: ${WEB_PORT:-5173}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:$${DEV_PORT:-5173}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    networks:
      - nox

networks:
  nox:
    driver: bridge

volumes:
  mysql_data:
  composer_cache:
  web_node_modules:
